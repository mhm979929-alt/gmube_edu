<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GMube Edu</title>
  <meta name="description" content="منصة GMube Edu التعليمية السورية - دروس، كتب، اختبارات">
  <meta name="theme-color" content="#0a0a0a">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <!-- Google Fonts: Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Feather Icons -->
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

  <!-- Appwrite SDK -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.min.js"></script>

  <!-- Plyr (video player) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* ===== تنسيق زر اسأل كتابك في القائمة السفلية ===== */
    #bottom-nav a.nav-item {
      flex: 1 0 auto;
      min-width: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: transparent;
      border: none;
      color: #888;
      font-family: 'Cairo', sans-serif;
      font-size: 10px;
      font-weight: 500;
      padding: 4px 2px;
      cursor: pointer;
      transition: color 0.2s;
      position: relative;
      white-space: nowrap;
      text-decoration: none;
    }
    #bottom-nav a.nav-item i {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }
    #bottom-nav a.nav-item span {
      font-size: 9px;
      line-height: 1.2;
    }
    #bottom-nav a.nav-item:hover {
      color: #6C63FF;
    }
    #bottom-nav a.nav-item.active {
      color: #6C63FF;
    }
    @media (max-width: 400px) {
      #bottom-nav a.nav-item span {
        font-size: 8px;
      }
      #bottom-nav a.nav-item i {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
<body>

<div id="app-shell">
  <div id="app-view">
    <!-- Pages render here -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-page="home">
      <i data-feather="home"></i>
      <span>الرئيسية</span>
    </button>
    <button class="nav-item" data-page="teachers">
      <i data-feather="users"></i>
      <span>الأساتذة</span>
    </button>
    <button class="nav-item" data-page="books">
      <i data-feather="book"></i>
      <span>الكتب</span>
    </button>
    <button class="nav-item" data-page="tests">
      <i data-feather="check-square"></i>
      <span>اختبارات</span>
    </button>
    <a href="ask-book.html" class="nav-item" data-page="ask-book">
      <i data-feather="message-square"></i>
      <span>اسأل كتابك</span>
    </a>
    <button class="nav-item" data-page="profile">
      <i data-feather="user"></i>
      <span>حسابي</span>
    </button>
  </nav>
</div>

<!-- ============================================ -->
<!--  سكربتات الجافاسكريبت (الترتيب مهم جداً هنا)  -->
<!-- ============================================ -->

<!-- 1. Config (الإعدادات الأساسية) -->
<script src="js/config.js"></script>

<!-- 2. API Layer (التواصل مع قاعدة البيانات) -->
<script src="js/api.js"></script>

<!-- 3. Auth (المصادقة وتسجيل الدخول) -->
<script src="js/auth.js"></script>

<!-- 4. Utils (الدوال المساعدة) -->
<script src="js/utils.js"></script>

<!-- 5. Router (التنقل بين الصفحات) -->
<script src="js/router.js"></script>

<!-- ============================================ -->
<!-- 6. Pages (جميع صفحات التطبيق)                -->
<!-- ============================================ -->
<script src="js/pages/home.js"></script>
<script src="js/pages/teachers.js"></script>
<script src="js/pages/books.js"></script>
<script src="js/pages/tests.js"></script>
<script src="js/pages/profile.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/watch.js"></script>
<script src="js/pages/subject.js"></script>
<script src="js/pages/channel.js"></script>
<script src="js/pages/playlist.js"></script>
<script src="js/pages/notifications.js"></script>
<script src="js/pages/take-test.js"></script>

<!-- ============================================ -->
<!-- 7. App Bootstrap (تشغيل التطبيق)             -->
<!-- ============================================ -->
<script src="js/app.js"></script>

<!-- Init Feather Icons -->
<script>
  feather.replace();
  
  // ============================================
  // تفعيل التنقل في القائمة السفلية
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    // إزالة الـ active من جميع الأزرار
    const navItems = document.querySelectorAll('#bottom-nav .nav-item');
    navItems.forEach(item => {
      item.classList.remove('active');
    });
    
    // تفعيل الزر حسب الصفحة الحالية
    const currentPage = window.location.hash.replace('#', '') || 'home';
    navItems.forEach(item => {
      const page = item.dataset.page;
      if (page === currentPage) {
        item.classList.add('active');
      }
    });
  });
</script>

</body>
</html>
